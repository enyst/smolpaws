<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Wet kitten avatar - inspired by the "Nooo problem" shower kitten -->
  <defs>
    <radialGradient id="fur" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#C8B898"/>
      <stop offset="60%" stop-color="#8B7355"/>
      <stop offset="100%" stop-color="#5C4A32"/>
    </radialGradient>
    <radialGradient id="chest" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#F0E8DC"/>
      <stop offset="100%" stop-color="#D4C8B0"/>
    </radialGradient>
    <radialGradient id="eye" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#3A3A3A"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>
  </defs>

  <!-- Body - slightly pear-shaped, wet and bedraggled -->
  <path d="M44,68 C34,70 28,82 30,100 C32,112 42,120 64,120 C86,120 96,112 98,100 C100,82 94,70 84,68 Z" fill="url(#fur)"/>

  <!-- Chest/belly - cream colored like the meme kitten -->
  <path d="M48,74 C44,80 42,92 44,106 C48,116 58,118 64,118 C70,118 80,116 84,106 C86,92 84,80 80,74 Z" fill="url(#chest)"/>

  <!-- Wet fur spikes on body - messy and everywhere -->
  <g stroke="#7B6545" stroke-width="1.5" stroke-linecap="round" fill="none">
    <path d="M38,72 L34,65 L36,63"/>
    <path d="M42,70 L40,62 L42,60"/>
    <path d="M86,70 L88,62 L86,60"/>
    <path d="M90,72 L94,65 L92,63"/>
    <path d="M46,68 L44,58"/>
    <path d="M82,68 L84,58"/>
    <!-- Chest spiky wet fur -->
    <path d="M52,76 L50,70" stroke="#C0B090"/>
    <path d="M58,74 L57,67" stroke="#C0B090"/>
    <path d="M70,74 L71,67" stroke="#C0B090"/>
    <path d="M76,76 L78,70" stroke="#C0B090"/>
  </g>

  <!-- Head - large and round -->
  <circle cx="64" cy="48" r="26" fill="url(#fur)"/>

  <!-- Head fur - lighter face -->
  <ellipse cx="64" cy="50" rx="18" ry="16" fill="#B8A080" opacity="0.6"/>

  <!-- Ears - big, pointy, slightly flattened from wet -->
  <path d="M42,32 L30,8 L50,28 Z" fill="#8B7355" stroke="#6B5535" stroke-width="1"/>
  <path d="M86,32 L98,8 L78,28 Z" fill="#8B7355" stroke="#6B5535" stroke-width="1"/>
  <!-- Inner ears -->
  <path d="M43,30 L34,14 L48,27 Z" fill="#E0A8A0" opacity="0.7"/>
  <path d="M85,30 L94,14 L80,27 Z" fill="#E0A8A0" opacity="0.7"/>

  <!-- Wet spikes from head - chaotic -->
  <g stroke="#7B6545" stroke-width="1.3" stroke-linecap="round" fill="none">
    <path d="M46,30 L40,22"/>
    <path d="M50,26 L46,18"/>
    <path d="M56,24 L54,16"/>
    <path d="M64,23 L64,14"/>
    <path d="M72,24 L74,16"/>
    <path d="M78,26 L82,18"/>
    <path d="M82,30 L88,22"/>
    <!-- Side spikes -->
    <path d="M40,40 L32,36"/>
    <path d="M88,40 L96,36"/>
    <path d="M38,48 L30,47"/>
    <path d="M90,48 L98,47"/>
  </g>

  <!-- Eyes - HUGE, round, the star of the show -->
  <circle cx="52" cy="46" r="10" fill="url(#eye)"/>
  <circle cx="76" cy="46" r="10" fill="url(#eye)"/>
  <!-- Golden-green iris ring -->
  <circle cx="52" cy="46" r="7" fill="none" stroke="#B8960A" stroke-width="1.5" opacity="0.4"/>
  <circle cx="76" cy="46" r="7" fill="none" stroke="#B8960A" stroke-width="1.5" opacity="0.4"/>
  <!-- Pupil -->
  <circle cx="52" cy="47" r="5.5" fill="#050505"/>
  <circle cx="76" cy="47" r="5.5" fill="#050505"/>
  <!-- Eye shine - big anime-style highlights -->
  <circle cx="55" cy="43" r="3" fill="white" opacity="0.9"/>
  <circle cx="79" cy="43" r="3" fill="white" opacity="0.9"/>
  <circle cx="50" cy="49" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="74" cy="49" r="1.5" fill="white" opacity="0.5"/>

  <!-- Nose - small pink triangle -->
  <path d="M62,56 L64,53 L66,56 Z" fill="#E8A0A0"/>

  <!-- Mouth - tiny open "o" of surprise -->
  <ellipse cx="64" cy="59" rx="2.5" ry="1.8" fill="#C07070" opacity="0.8"/>
  <path d="M60,57.5 Q62,56 64,57" fill="none" stroke="#8B6B55" stroke-width="0.7"/>
  <path d="M64,57 Q66,56 68,57.5" fill="none" stroke="#8B6B55" stroke-width="0.7"/>

  <!-- Whiskers - droopy from wet -->
  <g stroke="#A09070" stroke-width="0.7" stroke-linecap="round" fill="none">
    <path d="M48,55 Q30,52 18,56"/>
    <path d="M47,57 Q28,58 16,62"/>
    <path d="M46,59 Q30,64 20,68"/>
    <path d="M80,55 Q98,52 110,56"/>
    <path d="M81,57 Q100,58 112,62"/>
    <path d="M82,59 Q98,64 108,68"/>
  </g>

  <!-- Left paw - up and showing beans! -->
  <path d="M26,76 C18,72 12,74 10,82 C8,90 14,96 22,94 C28,92 32,86 30,78 Z" fill="#C8B898" stroke="#8B7355" stroke-width="1"/>
  <!-- Paw pad -->
  <ellipse cx="18" cy="86" rx="4" ry="3.5" fill="#F0B0B0" opacity="0.85"/>
  <!-- Toe beans!! -->
  <circle cx="13" cy="80" r="2.2" fill="#F0B0B0" opacity="0.85"/>
  <circle cx="16" cy="77" r="2" fill="#F0B0B0" opacity="0.85"/>
  <circle cx="20" cy="76" r="2" fill="#F0B0B0" opacity="0.85"/>
  <circle cx="24" cy="78" r="2.2" fill="#F0B0B0" opacity="0.85"/>

  <!-- Right paw - up and showing beans! -->
  <path d="M102,76 C110,72 116,74 118,82 C120,90 114,96 106,94 C100,92 96,86 98,78 Z" fill="#C8B898" stroke="#8B7355" stroke-width="1"/>
  <!-- Paw pad -->
  <ellipse cx="110" cy="86" rx="4" ry="3.5" fill="#F0B0B0" opacity="0.85"/>
  <!-- Toe beans!! -->
  <circle cx="115" cy="80" r="2.2" fill="#F0B0B0" opacity="0.85"/>
  <circle cx="112" cy="77" r="2" fill="#F0B0B0" opacity="0.85"/>
  <circle cx="108" cy="76" r="2" fill="#F0B0B0" opacity="0.85"/>
  <circle cx="104" cy="78" r="2.2" fill="#F0B0B0" opacity="0.85"/>

  <!-- Water drops falling -->
  <g fill="#7CB9E8">
    <ellipse cx="22" cy="10" rx="1.5" ry="2.5" opacity="0.6"/>
    <ellipse cx="106" cy="14" rx="1.3" ry="2.2" opacity="0.5"/>
    <ellipse cx="8" cy="60" rx="1.2" ry="2" opacity="0.5"/>
    <ellipse cx="120" cy="55" rx="1.4" ry="2.3" opacity="0.5"/>
    <ellipse cx="64" cy="4" rx="1.5" ry="2.5" opacity="0.65"/>
    <ellipse cx="38" cy="6" rx="1" ry="1.8" opacity="0.5"/>
    <ellipse cx="92" cy="8" rx="1.2" ry="2" opacity="0.55"/>
    <!-- Drips from ears -->
    <ellipse cx="28" cy="12" rx="1" ry="2" opacity="0.6"/>
    <ellipse cx="100" cy="12" rx="1" ry="2" opacity="0.6"/>
    <!-- Drips from body -->
    <ellipse cx="36" cy="116" rx="1" ry="1.8" opacity="0.4"/>
    <ellipse cx="92" cy="118" rx="0.8" ry="1.5" opacity="0.4"/>
    <ellipse cx="56" cy="122" rx="1.2" ry="2" opacity="0.35"/>
  </g>

  <!-- Tabby stripes on forehead - faint, wet -->
  <g stroke="#6B5535" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.3">
    <path d="M56,34 Q58,30 56,26"/>
    <path d="M64,33 L64,25"/>
    <path d="M72,34 Q70,30 72,26"/>
  </g>
</svg>
