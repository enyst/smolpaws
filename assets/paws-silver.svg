<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="20" height="20">
  <style>
    .pad { fill: #C0C0C0; stroke: #222; stroke-width: 1.2; }
    @media (prefers-color-scheme: dark) {
      .pad { fill: #E8E8E8; stroke: #FFF; }
    }
  </style>
  <!-- Left paw (larger, slightly behind) -->
  <g transform="translate(-2, 4) rotate(-8, 22, 36)">
    <ellipse cx="22" cy="40" rx="8" ry="6.5" class="pad"/>
    <ellipse cx="13" cy="30" rx="4" ry="4.5" class="pad"/>
    <ellipse cx="19" cy="26" rx="3.5" ry="4.5" class="pad"/>
    <ellipse cx="26" cy="26" rx="3.5" ry="4.5" class="pad"/>
    <ellipse cx="32" cy="30" rx="4" ry="4.5" class="pad"/>
  </g>
  <!-- Right paw (smaller, slightly in front) -->
  <g transform="translate(6, -4) rotate(8, 42, 30)">
    <ellipse cx="42" cy="34" rx="7" ry="5.5" class="pad"/>
    <ellipse cx="34" cy="25" rx="3.5" ry="4" class="pad"/>
    <ellipse cx="39.5" cy="21.5" rx="3" ry="4" class="pad"/>
    <ellipse cx="45.5" cy="21.5" rx="3" ry="4" class="pad"/>
    <ellipse cx="51" cy="25" rx="3.5" ry="4" class="pad"/>
  </g>
</svg>
